# 通用代价地图参数（全局/局部共用）
# 适配智能轮椅尺寸：底盘约 0.45 x 0.36 m，轮距 0.68 m

obstacle_range: 5.0          # 障碍物探测范围 (m)
raytrace_range: 8.0          # 光线追踪清除范围 (m)

# 机器人 footprint：轮椅俯视图轮廓（前、右、后、左）
footprint: [[0.30, 0.20], [0.30, -0.20], [-0.30, -0.20], [-0.30, 0.20]]

inflation_radius: 0.45       # 膨胀半径，略大于 footprint 半对角
cost_scaling_factor: 5.0     # 膨胀衰减系数，越大越陡

# 传感器配置：使用激光雷达
observation_sources: laser_scan_sensor
laser_scan_sensor: {
  sensor_frame: lidar_link,
  data_type: LaserScan,
  topic: /scan,
  marking: true,
  clearing: true,
  min_obstacle_height: 0.0,
  max_obstacle_height: 2.0
}
